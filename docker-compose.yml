services:
  plausible_db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=plausible_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plausible_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: always
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    healthcheck:
      test: ["CMD-SHELL", "wget -Y off --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  plausible:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plausible
    restart: always
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    ports:
      - "0.0.0.0:8033:8000"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    volumes:
      - plausible-data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      - TMPDIR=/var/lib/plausible/tmp
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-${SECRET_KEY:-/XhpUedeWuOc/Znw8bxbKg1cUCk3+Kn1pUy+m7RUhg3vxvWL/XREUQF/Zmy1Q5Um}}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@plausible_db:5432/plausible_db}
      - CLICKHOUSE_DATABASE_URL=${CLICKHOUSE_DATABASE_URL:-http://plausible_events_db:8123/plausible_events_db}
      - LISTEN_IP=0.0.0.0

volumes:
  db-data:
  clickhouse-data:
  plausible-data:
